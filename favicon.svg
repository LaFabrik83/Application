<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Fond teal avec coins arrondis -->
  <rect width="200" height="200" fill="#2EB3AF" rx="18"/>
  <!-- Monogramme LF : barre gauche verticale (L) -->
  <rect x="52" y="38" width="16" height="90" fill="white"/>
  <!-- Barre horizontale basse du L -->
  <rect x="52" y="112" width="44" height="16" fill="white"/>
  <!-- Barre droite verticale (F) -->
  <rect x="96" y="38" width="16" height="90" fill="white"/>
  <!-- Barre horizontale haute du F -->
  <rect x="96" y="38" width="40" height="16" fill="white"/>
  <!-- Barre horizontale milieu du F -->
  <rect x="96" y="72" width="32" height="14" fill="white"/>
  <!-- Texte FABRIK -->
  <text x="100" y="162" font-family="Arial Black,sans-serif" font-weight="900" font-size="30" fill="white" text-anchor="middle" letter-spacing="3">FABRIK</text>
  <!-- Texte DES LEADERS DE DEMAIN -->
  <text x="100" y="182" font-family="Arial,sans-serif" font-size="8.5" fill="rgba(255,255,255,0.85)" text-anchor="middle" letter-spacing="1.2">DES LEADERS DE DEMAIN</text>
</svg>
